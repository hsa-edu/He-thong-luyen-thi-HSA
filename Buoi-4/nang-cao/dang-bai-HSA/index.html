<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Học Tập HSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-3xl p-8 shadow-xl border border-slate-100 text-center">
        <div class="w-20 h-20 bg-amber-50 rounded-full flex items-center justify-center mx-auto mb-6 text-amber-500 text-3xl">
            <i class="fa-solid fa-hourglass-half animate-spin-slow"></i>
        </div>
        <h2 class="text-xl font-extrabold text-slate-900 mb-2">Tài Liệu Đang Cập Nhật</h2>
        <p class="text-sm text-slate-500 leading-relaxed mb-6">Thầy Hòa đang hoàn thiện hệ thống câu hỏi phân hóa cho phần này. Bài tập sẽ tự động hiển thị khi đến lịch học của buổi.</p>
        <button onclick="history.back()" class="inline-flex items-center space-x-2 text-xs bg-slate-900 text-white font-bold px-6 py-3 rounded-xl hover:bg-slate-800 transition">
            <i class="fa-solid fa-arrow-left"></i> <span>Quay lại trang chủ</span>
        </button>
    </div>
</body>
</html>
